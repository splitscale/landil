name: CI

on:
  push:
    branches: [main, staging, devops]
  pull_request:
    branches: [main, staging]

jobs:
  # ── Lint + Type Check + Build ─────────────────────────────────────────────
  build:
    name: Lint, Type Check & Build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Lint
        run: bun lint

      - name: Type check
        run: bun tsc --noEmit

      - name: Build
        env:
          # Dummy values — build must succeed without real infra
          DATABASE_URL: postgres://postgres:postgres@localhost:5432/landil
          DIRECT_URL: postgres://postgres:postgres@localhost:5432/landil
          BETTER_AUTH_SECRET: ci_secret
          NEXT_PUBLIC_BASE_URL: http://localhost:3000
          REDIS_URL: redis://localhost:6379
          UPLOADTHING_TOKEN: dummy
        run: bun run build

  # ── Playwright E2E ────────────────────────────────────────────────────────
  e2e:
    name: E2E Tests
    runs-on: ubuntu-latest
    # Only run on push to main/staging (not every PR — costs time)
    if: github.event_name == 'push'
    needs: build

    services:
      db:
        image: postgres:15-alpine
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: landil
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres -d landil"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10

      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 5

    env:
      DATABASE_URL: postgres://postgres:postgres@localhost:5432/landil
      DIRECT_URL: postgres://postgres:postgres@localhost:5432/landil
      BETTER_AUTH_SECRET: ci_secret
      NEXT_PUBLIC_BASE_URL: http://localhost:3000
      REDIS_URL: redis://localhost:6379
      UPLOADTHING_TOKEN: ${{ secrets.UPLOADTHING_TOKEN }}
      GOOGLE_CLIENT_ID: ${{ secrets.GOOGLE_CLIENT_ID }}
      GOOGLE_CLIENT_SECRET: ${{ secrets.GOOGLE_CLIENT_SECRET }}
      CI: true

    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Install Playwright browsers
        run: bunx playwright install --with-deps chromium

      - name: Run migrations
        run: bun db:migrate

      - name: Build
        run: bun run build

      - name: Start app
        run: bun start &
        # prestart (drizzle-kit push) will re-run here — idempotent, safe

      - name: Wait for app
        run: |
          for i in $(seq 1 30); do
            curl -sf http://localhost:3000 && break || sleep 2
          done

      - name: Run E2E tests
        run: bun e2e

      - name: Upload test artifacts
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: |
            test-results/
          retention-days: 7
