services:
  db:
    image: postgres:15-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: landil
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d landil"]
      interval: 5s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5

  # Local SMTP — web UI at http://localhost:8025
  mailpit:
    image: axllent/mailpit
    restart: unless-stopped
    ports:
      - "1025:1025"
      - "8025:8025"

  app:
    build: .
    restart: unless-stopped
    ports:
      - "3000:3000"
    environment:
      # Both point to direct postgres — no pgbouncer needed locally
      DATABASE_URL: postgres://postgres:postgres@db:5432/landil
      DIRECT_URL: postgres://postgres:postgres@db:5432/landil
      BETTER_AUTH_SECRET: local_dev_secret_change_in_prod
      NEXT_PUBLIC_BASE_URL: http://localhost:3000
      REDIS_URL: redis://redis:6379
      SMTP_HOST: mailpit
      SMTP_PORT: "1025"
      SMTP_SECURE: "false"
      SMTP_FROM: "Landil <no-reply@landil.app>"
      # Set these via .env or override: UPLOADTHING_TOKEN, GOOGLE_CLIENT_ID, GOOGLE_CLIENT_SECRET
    env_file:
      - .env.local
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy

volumes:
  postgres_data:
  redis_data:
